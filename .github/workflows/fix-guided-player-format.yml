name: Finalize guided player formatting

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/fix-guided-player-format.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.repository == 'kofiarhin/piano360'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix formatting and remove one-time workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/client/src/features/courses/timeline/TimelinePlayer.tsx')
          content = path.read_text()
          malformed = '                        ? "Resume"\n                                 : "Play"}'
          formatted = '                        ? "Resume"\n                        : "Play"}'
          if malformed not in content:
              raise SystemExit('Expected formatting target was not found')
          path.write_text(content.replace(malformed, formatted, 1))
          PY
          git rm .github/workflows/fix-guided-player-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/client/src/features/courses/timeline/TimelinePlayer.tsx
          git commit -m "chore: finalize guided player formatting"
          git push origin HEAD:main
