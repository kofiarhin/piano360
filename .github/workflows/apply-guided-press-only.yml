name: Apply guided press-only interaction

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-guided-press-only.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.repository == 'kofiarhin/piano360'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Decode implementation payloads
        run: |
          python3 - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          mapping = {
              ".github/apply-guided-press-only/guidedStopWait.ts.gz.b64": "apps/client/src/features/courses/timeline/guidedStopWait.ts",
              ".github/apply-guided-press-only/TimelinePlayer.tsx.gz.b64": "apps/client/src/features/courses/timeline/TimelinePlayer.tsx",
              ".github/apply-guided-press-only/guidedStopWait.test.ts.gz.b64": "apps/client/src/features/courses/timeline/guidedStopWait.test.ts",
              ".github/apply-guided-press-only/TimelinePlayer.test.tsx.gz.b64": "apps/client/src/features/courses/timeline/TimelinePlayer.test.tsx",
          }

          for source, target in mapping.items():
              encoded = Path(source).read_text().strip()
              Path(target).write_bytes(gzip.decompress(base64.b64decode(encoded)))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: |
          npx prettier --check \
            apps/client/src/features/courses/timeline/guidedStopWait.ts \
            apps/client/src/features/courses/timeline/TimelinePlayer.tsx \
            apps/client/src/features/courses/timeline/guidedStopWait.test.ts \
            apps/client/src/features/courses/timeline/TimelinePlayer.test.tsx

      - name: Run focused client tests
        run: |
          npm test -w @piano360/client -- \
            src/features/courses/timeline/guidedStopWait.test.ts \
            src/features/courses/timeline/TimelinePlayer.test.tsx

      - name: Typecheck client
        run: npm run typecheck -w @piano360/client

      - name: Build client
        run: npm run build -w @piano360/client

      - name: Commit implementation to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/client/src/features/courses/timeline/guidedStopWait.ts \
            apps/client/src/features/courses/timeline/TimelinePlayer.tsx \
            apps/client/src/features/courses/timeline/guidedStopWait.test.ts \
            apps/client/src/features/courses/timeline/TimelinePlayer.test.tsx
          git commit -m "feat: simplify guided stop-and-wait input"
          git push origin HEAD:main
